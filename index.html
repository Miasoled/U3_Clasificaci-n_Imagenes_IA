<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Prediccion de prendas</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #dbeafe, #eff6ff, #bfdbfe);
        color: #0f172a;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 24px;
      }

      .app {
        width: 100%;
        max-width: 760px;
        background: white;
        border: 1px solid #bfdbfe;
        border-radius: 18px;
        box-shadow: 0 20px 45px rgba(30, 64, 175, 0.18);
        padding: 28px;
      }

      .header {
        text-align: center;
        margin-bottom: 22px;
      }

      h1 {
        margin: 0;
        font-size: 34px;
        color: #1d4ed8;
      }

      .subtitle {
        margin-top: 8px;
        font-size: 15px;
        color: #475569;
      }

      .canvas-wrap {
        background: #eff6ff;
        border: 2px solid #93c5fd;
        border-radius: 16px;
        padding: 16px;
      }

      canvas {
        width: 100%;
        max-width: 520px;
        height: auto;
        aspect-ratio: 1 / 1;
        display: block;
        margin: 0 auto;
        background: white;
        border: 2px dashed #60a5fa;
        border-radius: 12px;
        cursor: crosshair;
        touch-action: none;
      }

      .controls {
        display: flex;
        justify-content: center;
        gap: 14px;
        margin-top: 22px;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 11px 22px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease,
          background 0.15s ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 18px rgba(37, 99, 235, 0.22);
      }

      .btn-clear {
        background: #e0f2fe;
        color: #075985;
      }

      .btn-clear:hover {
        background: #bae6fd;
      }

      .btn-predict {
        background: #2563eb;
        color: white;
      }

      .btn-predict:hover {
        background: #1d4ed8;
      }

      #resultado {
        margin: 22px auto 0;
        max-width: 520px;
        min-height: 58px;
        padding: 16px;
        border-radius: 14px;
        background: #dbeafe;
        border: 1px solid #93c5fd;
        color: #1e3a8a;
        font-size: 20px;
        font-weight: 700;
        text-align: center;
      }

      .hint {
        margin-top: 12px;
        text-align: center;
        font-size: 13px;
        color: #64748b;
      }
    </style>
  </head>

  <body>
    <main class="app">
      <section class="header">
        <h1>Prediccion de prendas</h1>
        <div class="subtitle">
          Dibuja una prenda en el cuadro y presiona predecir
        </div>
      </section>

      <section class="canvas-wrap">
        <canvas id="canvas" width="500" height="500"></canvas>
      </section>

      <div class="controls">
        <button class="btn-clear" onclick="limpiar()">Limpiar</button>
        <button class="btn-predict" onclick="predecir()">Predecir</button>
      </div>

      <p id="resultado">Cargando modelo...</p>
      <div class="hint">Modelo entrenado con Fashion MNIST</div>
    </main>

    <script>
      const clases = [
        "Camiseta/top",
        "Pantalon",
        "Sueter",
        "Vestido",
        "Abrigo",
        "Sandalia",
        "Camisa",
        "Tenis",
        "Bolso",
        "Botin",
      ];

      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const resultado = document.getElementById("resultado");

      let modelo;
      let dibujando = false;

      function limpiar() {
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        resultado.innerText = modelo
          ? "Dibuja una prenda y presiona Predecir."
          : "Cargando modelo...";
      }

      function obtenerPosicion(evento) {
        const rect = canvas.getBoundingClientRect();
        const punto = evento.touches ? evento.touches[0] : evento;

        return {
          x: (punto.clientX - rect.left) * (canvas.width / rect.width),
          y: (punto.clientY - rect.top) * (canvas.height / rect.height),
        };
      }

      function iniciarDibujo(evento) {
        evento.preventDefault();
        dibujando = true;

        const p = obtenerPosicion(evento);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
      }

      function dibujar(evento) {
        if (!dibujando) return;
        evento.preventDefault();

        const p = obtenerPosicion(evento);

        ctx.lineWidth = 12;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = "black";
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
      }

      function terminarDibujo() {
        dibujando = false;
      }

      canvas.addEventListener("mousedown", iniciarDibujo);
      canvas.addEventListener("mousemove", dibujar);
      window.addEventListener("mouseup", terminarDibujo);

      canvas.addEventListener("touchstart", iniciarDibujo);
      canvas.addEventListener("touchmove", dibujar);
      window.addEventListener("touchend", terminarDibujo);

      function obtenerTensor() {
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;

        let minX = canvas.width;
        let minY = canvas.height;
        let maxX = 0;
        let maxY = 0;

        for (let y = 0; y < canvas.height; y++) {
          for (let x = 0; x < canvas.width; x++) {
            const i = (y * canvas.width + x) * 4;
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];

            if (r < 240 || g < 240 || b < 240) {
              if (x < minX) minX = x;
              if (y < minY) minY = y;
              if (x > maxX) maxX = x;
              if (y > maxY) maxY = y;
            }
          }
        }

        if (minX > maxX || minY > maxY) {
          resultado.innerText = "Dibuja algo primero.";
          return null;
        }

        const ancho = maxX - minX;
        const alto = maxY - minY;
        const lado = Math.max(ancho, alto);
        const margen = lado * 0.35;

        const sx = Math.max(0, minX - margen);
        const sy = Math.max(0, minY - margen);
        const sw = Math.min(canvas.width - sx, lado + margen * 2);
        const sh = Math.min(canvas.height - sy, lado + margen * 2);

        const temp = document.createElement("canvas");
        temp.width = 28;
        temp.height = 28;

        const tctx = temp.getContext("2d");
        tctx.fillStyle = "white";
        tctx.fillRect(0, 0, 28, 28);
        tctx.drawImage(canvas, sx, sy, sw, sh, 0, 0, 28, 28);

        return tf.tidy(function () {
          const img = tf.browser.fromPixels(temp, 1);
          return tf.scalar(255).sub(img).div(255).expandDims(0);
        });
      }

      async function predecir() {
        if (!modelo) {
          resultado.innerText = "El modelo aun esta cargando.";
          return;
        }

        const tensor = obtenerTensor();
        if (tensor === null) return;

        const prediccion = modelo.predict(tensor);
        const datos = await prediccion.data();

        let mayor = 0;

        for (let i = 1; i < datos.length; i++) {
          if (datos[i] > datos[mayor]) {
            mayor = i;
          }
        }

        const porcentaje = (datos[mayor] * 100).toFixed(2);
        resultado.innerText = clases[mayor] + " - " + porcentaje + "%";

        tensor.dispose();
        prediccion.dispose();
      }

      async function cargarModelo() {
        try {
          modelo = await tf.loadGraphModel("tfjs_target_dir/model.json");
          resultado.innerText = "Dibuja una prenda y presiona Predecir.";
        } catch (error) {
          resultado.innerText = "No se pudo cargar el modelo.";
          console.error(error);
        }
      }

      limpiar();
      cargarModelo();
    </script>
  </body>
</html>
